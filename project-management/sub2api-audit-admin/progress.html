    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface2: #f0f3f7;
      --text: #172033;
      --muted: #667085;
      --border: #d8dee8;
      --blue: #2563eb;
      --green: #13a66b;
      --amber: #d97706;
      --red: #dc2626;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f172a;
      --surface: #111827;
      --surface2: #1f2937;
      --text: #dbe4f0;
      --muted: #9ca3af;
      --border: #273449;
      --blue: #60a5fa;
      --green: #34d399;
      --amber: #f59e0b;
      --red: #f87171;
      --shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select {
      font: inherit;
    }

    .shell {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }

    .side {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      background: #111827;
      color: #f9fafb;
      overflow-y: auto;
    }

    .brand {
      margin-bottom: 24px;
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 750;
    }

    .brand p {
      margin: 0;
      color: #aab4c4;
      font-size: 13px;
      line-height: 1.6;
    }

    .sideLink {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      margin: 0 0 8px;
      padding: 10px 12px;
      color: #d7deea;
      text-decoration: none;
      border-radius: 7px;
      background: transparent;
      border: 0;
      cursor: pointer;
      text-align: left;
    }

    .sideLink:hover,
    .sideLink.active {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .sideBadge {
      min-width: 42px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 12px;
      text-align: center;
      color: #dbeafe;
      background: rgba(37, 99, 235, 0.28);
    }

    .main {
      padding: 28px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .top h2 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .top p {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 7px;
      height: 36px;
      padding: 0 12px;
      cursor: pointer;
    }

    .btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .btn.danger {
      border-color: #fecaca;
      color: var(--red);
    }

    .themeField {
      width: 124px;
      height: 36px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
      line-height: 1;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-top: 12px;
    }

    .barFill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 0.2s ease;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) 180px 180px;
      gap: 12px;
      margin-bottom: 18px;
    }

    .field {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .section {
      margin-bottom: 26px;
    }

    .sectionHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .sectionHead h3 {
      margin: 0;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .cardHead {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .card h4 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .status {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      color: var(--muted);
      background: var(--surface2);
    }

    .status.done {
      color: #047857;
      background: #d1fae5;
    }

    .status.doing {
      color: #92400e;
      background: #fef3c7;
    }

    .checks {
      display: grid;
      gap: 8px;
    }

    .check {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      align-items: start;
      gap: 8px;
      padding: 8px;
      border-radius: 7px;
      background: var(--surface);
      border: 1px solid transparent;
    }

    .check:hover {
      border-color: var(--border);
    }

    .check input {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      accent-color: var(--blue);
    }

    .check label {
      font-size: 14px;
      line-height: 1.5;
      cursor: pointer;
    }

    .check.done label {
      color: var(--muted);
      text-decoration: line-through;
    }

    :root[data-theme="dark"] .status.done {
      color: #bbf7d0;
      background: rgba(19, 166, 107, 0.22);
    }

    :root[data-theme="dark"] .status.doing {
      color: #fde68a;
      background: rgba(217, 119, 6, 0.22);
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    .empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    @media (max-width: 1040px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: relative; height: auto; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .main { padding: 18px; }
      .top { flex-direction: column; }
      .actions { justify-content: flex-start; }
      .metrics { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>

        desc: '首页、requested 模型、历史账、调额、财务和审计页面已完成。',
        items: ['首页 ECharts 看板', 'Sub2API 用户数据源', 'requested 模型统计', '用户与额度', '调额表单', '调额/财务表格', '历史账与 CSV', '审计页面', 'Node 22 构建', '桌面端验收', 'H5 手机端验收', '前后端联通验收', '官方失败状态']
      },
      {
        id: 'm13',
        title: '13 联调验收与部署',
        doc: 'modules/13-verification-deployment.md',
        desc: '本地实现与自动化验证已完成；等待首次切账、官方统计和生产小额调额验收。',
        items: ['后端全量测试（79 passed / 689 assertions / 1 skipped）', 'Node 22.22.0 前端构建通过', 'PHP 语法检查通过', 'git diff/UTF-8/敏感信息检查通过', '官方统计基准验收', '首次切账与源关联', '真实调增/调减', '部署文档']
      }
    ]

    let state = loadState()

    const qs = (sel) => document.querySelector(sel)
    const makeId = (prefix, id, idx) => `${prefix}:${id}:${idx}`
    const systemDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches

    function themeName(mode) {
      if (mode === 'dark' || mode === 'light') return mode
      return systemDark() ? 'dark' : 'light'
    }

    function applyTheme(mode) {
      document.documentElement.dataset.theme = themeName(mode)
    }

    function initTheme() {
      const mode = localStorage.getItem(themeKey) || 'system'
      qs('#themeMode').value = mode
      applyTheme(mode)
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if ((localStorage.getItem(themeKey) || 'system') === 'system') applyTheme('system')
      })
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storeKey) || '{}')
        return { ...saved, ...defaultState, updatedAt: saved.updatedAt || defaultState.updatedAt }
      } catch {
        return { ...defaultState }
      }
    }

    function saveState() {
      state.updatedAt = new Date().toLocaleString('zh-CN', { hour12: false })
      localStorage.setItem(storeKey, JSON.stringify(state))
    }

    function isDone(id) {
      return state[id] === true
    }

    function setDone(id, checked) {
      state[id] = checked
      saveState()
      render()
    }

    function calcItems() {
      const ids = []
      phases.forEach((p) => ids.push(makeId('phase', p[0], 0)))
      modules.forEach((mod) => mod.items.forEach((_, idx) => ids.push(makeId('mod', mod.id, idx))))
      const done = ids.filter(isDone).length
      return { ids, done, total: ids.length }
    }

    function modulePct(mod) {
      const done = mod.items.filter((_, idx) => isDone(makeId('mod', mod.id, idx))).length
      return Math.round((done / mod.items.length) * 100)
    }

    function statusText(pct) {
      if (pct === 100) return ['已完成', 'done']
      if (pct > 0) return ['进行中', 'doing']
      return ['未开始', 'todo']
    }

    function checkbox(id, text) {
      const done = isDone(id)
      return `
        <div class="check ${done ? 'done' : ''}">
          <input id="${id}" type="checkbox" ${done ? 'checked' : ''} data-id="${id}">
          <label for="${id}">${text}</label>
        </div>
      `
    }

    function renderSide() {
      const nav = qs('#sideNav')
      nav.innerHTML = modules.map((mod) => {
        const pct = modulePct(mod)
        return `<a class="sideLink" href="#${mod.id}"><span>${mod.title}</span><span class="sideBadge">${pct}%</span></a>`
      }).join('')
    }

    function renderPhases() {
      qs('#phaseGrid').innerHTML = phases.map((item) => {
        const id = makeId('phase', item[0], 0)
        const done = isDone(id)
        return `
          <article class="card">
            <div class="cardHead">
              <div>
                <h4>${item[1]}</h4>
                <p>${item[2]}</p>
              </div>
              <span class="status ${done ? 'done' : ''}">${done ? '已完成' : '未完成'}</span>
            </div>
            <div class="checks">${checkbox(id, '阶段完成')}</div>
          </article>
        `
      }).join('')
    }

    function renderModules() {
      const search = qs('#searchInput').value.trim().toLowerCase()
      const status = qs('#statusFilter').value
      const modFilter = qs('#moduleFilter').value
      const cards = []

      modules.forEach((mod) => {
        const pct = modulePct(mod)
        const [label, cls] = statusText(pct)
        const text = `${mod.title} ${mod.desc} ${mod.items.join(' ')}`.toLowerCase()
        const statusOk = status === 'all' || (status === 'done' && pct === 100) || (status === 'todo' && pct < 100)
        const modOk = modFilter === 'all' || modFilter === mod.id
        const searchOk = !search || text.includes(search)
        if (!statusOk || !modOk || !searchOk) return

        cards.push(`
          <article class="card" id="${mod.id}">
            <div class="cardHead">
              <div>
                <h4>${mod.title}</h4>
                <p>${mod.desc}</p>
                <div class="small">${mod.doc}</div>
              </div>
              <span class="status ${cls}">${label} ${pct}%</span>
            </div>
            <div class="bar"><div class="barFill" style="width:${pct}%"></div></div>
            <div class="checks" style="margin-top:12px">
              ${mod.items.map((item, idx) => checkbox(makeId('mod', mod.id, idx), item)).join('')}
            </div>
          </article>
        `)
      })

      qs('#moduleGrid').innerHTML = cards.join('')
      qs('#emptyState').classList.toggle('hidden', cards.length > 0)
    }

    function renderMetrics() {
      const { done, total } = calcItems()
      const pct = total ? Math.round((done / total) * 100) : 0
      const doneMods = modules.filter((mod) => modulePct(mod) === 100).length
      qs('#totalPct').textContent = `${pct}%`
      qs('#totalBar').style.width = `${pct}%`
      qs('#doneCount').textContent = String(done)
      qs('#totalCount').textContent = `共 ${total} 项`
      qs('#doneModules').textContent = String(doneMods)
      qs('#updatedAt').textContent = state.updatedAt || '-'
    }

    function fillModuleFilter() {
      const sel = qs('#moduleFilter')
      if (sel.options.length > 1) return
      modules.forEach((mod) => {
        const opt = document.createElement('option')
        opt.value = mod.id
        opt.textContent = mod.title
        sel.appendChild(opt)
      })
    }

    function bindEvents() {
      document.body.addEventListener('change', (event) => {
        const el = event.target
        if (el.matches('input[type="checkbox"][data-id]')) setDone(el.dataset.id, el.checked)
      })

      qs('#searchInput').addEventListener('input', renderModules)
      qs('#statusFilter').addEventListener('change', renderModules)
      qs('#moduleFilter').addEventListener('change', renderModules)
      qs('#themeMode').addEventListener('change', (event) => {
        const mode = event.target.value
        localStorage.setItem(themeKey, mode)
        applyTheme(mode)
      })
      qs('#printBtn').addEventListener('click', () => window.print())
      qs('#resetBtn').addEventListener('click', () => {
        if (!confirm('确认清空所有勾选状态？')) return
        state = { ...defaultState }
        localStorage.removeItem(storeKey)
        render()
      })
      qs('#exportBtn').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json;charset=utf-8' })
        const url = URL.createObjectURL(blob)
        const link = document.createElement('a')
        link.href = url
        link.download = 'sub2api-audit-progress.json'
        link.click()
        URL.revokeObjectURL(url)
      })
    }

    function render() {
      fillModuleFilter()
      renderMetrics()
      renderSide()
      renderPhases()
      renderModules()
    }

    bindEvents()
    initTheme()
    render()
  </script>
</body>
</html>
